name: Github Actions
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
      - uses: treeform/setup-nim-action@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        shell: bash
        run: |
          cd ..
          nimby install -g "${{ github.event.repository.name }}/${{ github.event.repository.name }}.nimble"
      - name: Run native tests
        run: nim r tests/tests.nim
      - name: Run flatty32 tests
        run: nim r -d:flatty32 tests/tests.nim
      - name: Run flatty64 tests
        run: nim r -d:flatty64 tests/tests.nim
      - name: Run JavaScript tests with Node
        run: nim js -r tests/tests.nim
      - name: Run JavaScript tests in strict mode
        run: node tests/js_strict_runner.mjs tests/tests.js
      - name: Run JavaScript binny tests with Node
        run: nim js -r tests/jstest_jsbinny.nim
